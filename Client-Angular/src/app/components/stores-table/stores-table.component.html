<table class="table table-striped border">
	<thead>
		<tr>
			<th scope="col">Id</th>
			<th scope="col">Nombre</th>
			<th scope="col">Dirección</th>
			<th scope="col">Ciudad</th>
		</tr>
	</thead>
	<tbody>
		@for (store of stores; track store) {
			<tr>
				<th scope="row">{{ store.id }}</th>
				<td>{{ store.name }}</td>
				<td>{{ store.address }}</td>
				<td>{{ store.city }}</td>
			</tr>
		}
	</tbody>
</table>
